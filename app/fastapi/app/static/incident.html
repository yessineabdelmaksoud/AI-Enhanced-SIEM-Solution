<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident — SOC AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-slate-900 text-white px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-semibold">SOC AI Enrichment</h1>
    <nav class="text-sm">
      <a href="/" class="hover:underline mr-4">← Incidents</a>
      <a href="/ui/health" class="hover:underline">Health</a>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-6">
    <div id="status" class="text-sm text-slate-500 mb-3">Chargement…</div>

    <!-- Header incident -->
    <div id="incident-header" class="mb-4"></div>

    <!-- Alerte source + contexte -->
    <section id="alert-section" class="bg-white rounded-lg shadow p-5 mb-6 hidden">
      <h2 class="text-lg font-semibold mb-3">Alerte source</h2>
      <div id="alert-body" class="text-sm"></div>
      <h3 class="font-semibold mt-4 mb-2">Contexte corrélé (<span id="ctx-count">0</span>)</h3>
      <div id="context-body" class="text-sm"></div>
    </section>

    <!-- Bouton tout générer -->
    <div class="mb-4">
      <button id="generate-all" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded text-sm">
        Générer les 3 enrichissements
      </button>
    </div>

    <!-- Onglets -->
    <div class="flex gap-1 border-b border-slate-200 mb-0">
      <button data-tab="explain" class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent">Explication</button>
      <button data-tab="investigate" class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent">Investigation</button>
      <button data-tab="remediate" class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent">Remédiation</button>
    </div>

    <!-- Contenu onglet -->
    <section id="tab-content" class="bg-white rounded-b-lg rounded-tr-lg shadow p-5 min-h-[160px]"></section>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/detail.js"></script>
</body>
</html>
