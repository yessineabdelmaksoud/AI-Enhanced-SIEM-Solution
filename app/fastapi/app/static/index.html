<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOC AI Enrichment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="bg-slate-900 text-white px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-semibold">SOC AI Enrichment</h1>
    <nav class="text-sm">
      <a href="/" class="hover:underline mr-4">Incidents</a>
      <a href="/ui/health" class="hover:underline">Health</a>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-6">
    <h2 class="text-lg font-semibold mb-4">Incidents</h2>

    <!-- Filtres -->
    <div class="flex flex-wrap items-center gap-3 mb-4">
      <select id="time-range" class="border border-slate-300 rounded px-3 py-1.5 text-sm bg-white">
        <option value="1">1 heure</option>
        <option value="6">6 heures</option>
        <option value="24" selected>24 heures</option>
        <option value="72">3 jours</option>
        <option value="168">7 jours</option>
      </select>
      <select id="category-filter" class="border border-slate-300 rounded px-3 py-1.5 text-sm bg-white">
        <option value="all">Toutes catégories</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <input id="search" placeholder="Règle ou IP…" class="border border-slate-300 rounded px-3 py-1.5 text-sm flex-1 min-w-[160px]">
      <button id="refresh" class="text-sm bg-slate-200 hover:bg-slate-300 px-3 py-1.5 rounded">Rafraîchir</button>
    </div>

    <!-- Stats -->
    <div id="stats" class="flex flex-wrap gap-2 mb-4 text-xs"></div>

    <div id="status" class="text-sm text-slate-500 mb-3">Chargement…</div>

    <div class="overflow-x-auto bg-white rounded-lg shadow">
      <table class="w-full text-sm">
        <thead class="bg-slate-100 text-slate-600 text-left">
          <tr>
            <th class="px-4 py-3">Risk</th>
            <th class="px-4 py-3">Score</th>
            <th class="px-4 py-3">Règle</th>
            <th class="px-4 py-3">Source</th>
            <th class="px-4 py-3">Entité</th>
            <th class="px-4 py-3">Occ.</th>
            <th class="px-4 py-3">Vu</th>
            <th class="px-4 py-3">Enrichi</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody id="incidents-body"></tbody>
      </table>
    </div>
  </main>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/incidents.js"></script>
</body>
</html>
